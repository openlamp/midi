name: Publish to PyPI

# Trusted Publishing (OIDC) — no API token / secret stored in the repo.
# Fires when you publish a GitHub Release. One-time PyPI setup is documented in
# README.md ("Publishing to PyPI (maintainer)"): add a Trusted Publisher on
# pypi.org pointing at openlamp/midi + this workflow + the "pypi" environment.

on:
  release:
    types: [published]
  workflow_dispatch: {}     # allow a manual run from the Actions tab

permissions: {}             # least privilege by default; jobs opt in below

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Build
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Check metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*
      - uses: actions/upload-artifact@v5
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI (OIDC)
    needs: build
    runs-on: ubuntu-latest
    environment: pypi          # protect the publish behind a named environment
    permissions:
      id-token: write          # REQUIRED for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
